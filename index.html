<style>
  :root {
    --tierra: #C4601A;
    --tierra-light: #E8834A;
    --tierra-dark: #8B3E0A;
    --arena: #F5EDD8;
    --arena-dark: #E8D9BB;
    --verde: #3D6B4F;
    --verde-light: #5A9470;
    --cielo: #2C5F7A;
    --cielo-light: #4A8BA8;
    --blanco: #FEFAF4;
    --gris: #6B6355;
    --gris-light: #A09880;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--blanco); color:#2A2018; min-height:100vh; overflow-x:hidden; }

  /* ===== PAGES ===== */
  .page { display:none; min-height:100vh; flex-direction:column; }
  .page.active { display:flex; }

  /* ===== HEADER HOME ===== */
  .home-header {
    background: linear-gradient(160deg, var(--tierra-dark) 0%, var(--tierra) 60%, var(--tierra-light) 100%);
    padding: 52px 20px 40px;
    position: relative;
    overflow: hidden;
  }
  .home-header::after {
    content:''; position:absolute; bottom:0; left:0; right:0;
    height:28px; background:var(--blanco); border-radius:28px 28px 0 0;
  }
  .app-logo { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .logo-icon { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text { font-family:'Playfair Display',serif; color:white; font-size:16px; font-weight:700; line-height:1; }
  .logo-text span { display:block; font-size:10px; font-family:'DM Sans',sans-serif; font-weight:300; opacity:0.8; letter-spacing:0.1em; text-transform:uppercase; }
  .home-title { font-family:'Playfair Display',serif; color:white; font-size:28px; font-weight:900; line-height:1.2; margin-bottom:6px; position:relative; z-index:1; }
  .home-subtitle { color:rgba(255,255,255,0.75); font-size:13px; font-weight:300; position:relative; z-index:1; }

  /* ===== SEARCH ===== */
  .search-wrap { padding:20px 20px 0; }
  .search-bar { background:white; border-radius:14px; padding:12px 16px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(70,50,20,0.12); border:1.5px solid var(--arena-dark); }
  .search-bar input { border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:14px; color:#2A2018; flex:1; background:transparent; }
  .search-bar input::placeholder { color:var(--gris-light); }

  /* ===== CATEGORIES ===== */
  .section-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--gris); padding:20px 20px 12px; }
  .cats-scroll { display:flex; gap:10px; padding:0 20px 4px; overflow-x:auto; scrollbar-width:none; }
  .cats-scroll::-webkit-scrollbar { display:none; }
  .cat-pill { flex-shrink:0; background:white; border:1.5px solid var(--arena-dark); border-radius:20px; padding:8px 14px; display:flex; align-items:center; gap:6px; cursor:pointer; transition:all 0.2s; }
  .cat-pill.active { background:var(--tierra); border-color:var(--tierra); color:white; }
  .cat-pill span:first-child { font-size:14px; }
  .cat-pill span:last-child { font-size:12px; font-weight:500; }

  /* ===== CARDS ===== */
  .cards-container { padding:4px 20px; flex:1; }
  .no-results { text-align:center; padding:40px 20px; color:var(--gris-light); font-size:14px; }

  .comercio-card {
    background:white; border-radius:18px; overflow:hidden;
    box-shadow:0 4px 16px rgba(70,50,20,0.1); border:1.5px solid var(--arena-dark);
    margin-bottom:14px; cursor:pointer; transition:transform 0.15s;
  }
  .comercio-card:active { transform:scale(0.98); }
  .card-img {
    height:110px; position:relative; display:flex; align-items:flex-end; padding:12px;
  }
  .card-img-emoji { font-size:52px; position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); opacity:0.25; }
  .card-badge { font-size:10px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.05em; text-transform:uppercase; position:relative; z-index:1; }
  .badge-destacado { background:var(--tierra); color:white; }
  .badge-basico { background:var(--verde); color:white; }
  .badge-gratis { background:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.5); color:white; }
  .card-body { padding:14px; }
  .card-name { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; margin-bottom:3px; }
  .card-cat { font-size:11px; color:var(--gris-light); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .card-info { display:flex; gap:12px; font-size:12px; color:var(--gris); flex-wrap:wrap; }
  .open-dot { width:7px; height:7px; background:#4CAF50; border-radius:50%; display:inline-block; margin-right:3px; }
  .closed-dot { width:7px; height:7px; background:#e53935; border-radius:50%; display:inline-block; margin-right:3px; }

  /* LOCKED */
  .locked-card {
    background:var(--arena); border:1.5px dashed var(--arena-dark);
    border-radius:18px; margin-bottom:12px; padding:14px;
    display:flex; align-items:center; gap:12px; opacity:0.75;
  }
  .locked-icon { width:42px; height:42px; background:var(--arena-dark); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .locked-name { font-size:13px; font-weight:600; color:var(--gris); margin-bottom:2px; }
  .locked-sub { font-size:11px; color:var(--gris-light); }
  .locked-cta { margin-left:auto; background:var(--tierra); color:white; border:none; border-radius:8px; padding:7px 10px; font-size:10px; font-weight:600; cursor:pointer; flex-shrink:0; font-family:'DM Sans',sans-serif; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav { background:white; border-top:1px solid var(--arena-dark); display:flex; padding:10px 0 20px; position:sticky; bottom:0; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; }
  .nav-icon { font-size:20px; }
  .nav-label { font-size:9px; font-weight:500; color:var(--gris-light); text-transform:uppercase; letter-spacing:0.05em; }

  /* ===== FICHA PAGE ===== */
  .ficha-header { height:180px; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .ficha-header-emoji { font-size:90px; opacity:0.25; }
  .ficha-back { position:absolute; top:48px; left:16px; width:38px; height:38px; background:rgba(255,255,255,0.25); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; color:white; backdrop-filter:blur(4px); border:none; }
  .ficha-verified { position:absolute; top:50px; right:16px; background:var(--tierra); color:white; font-size:10px; font-weight:600; padding:5px 10px; border-radius:10px; }
  .ficha-body { padding:20px; flex:1; overflow-y:auto; }
  .ficha-name { font-family:'Playfair Display',serif; font-size:24px; font-weight:900; margin-bottom:4px; }
  .ficha-cat { font-size:12px; color:var(--gris-light); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px; }

  .ficha-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
  .action-btn { background:var(--arena); border:none; border-radius:12px; padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background 0.15s; }
  .action-btn.primary { background:var(--tierra); color:white; }
  .action-btn-icon { font-size:22px; }
  .action-btn-label { font-size:10px; font-weight:600; color:var(--gris); }
  .action-btn.primary .action-btn-label { color:rgba(255,255,255,0.9); }

  .ficha-section { margin-bottom:20px; }
  .ficha-section-title { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--gris-light); font-weight:600; margin-bottom:10px; }
  .ficha-desc { font-size:13px; line-height:1.7; color:var(--gris); }

  .horarios-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .horario-item { background:var(--arena); border-radius:8px; padding:9px 10px; }
  .horario-day { font-weight:600; font-size:11px; color:var(--gris); }
  .horario-time { color:var(--tierra); font-weight:500; font-size:12px; margin-top:2px; }

  .oferta-chip { background:linear-gradient(135deg, var(--tierra-light), var(--tierra)); border-radius:12px; padding:14px; color:white; display:flex; align-items:center; gap:10px; }
  .oferta-chip-emoji { font-size:26px; }
  .oferta-chip-title { font-size:13px; font-weight:600; }
  .oferta-chip-sub { font-size:11px; opacity:0.85; margin-top:2px; }

  .ubicacion-box { background:var(--arena); border-radius:12px; padding:13px 15px; font-size:13px; color:var(--gris); }

  /* ===== OFERTA BANNER ===== */
  .oferta-banner { margin:4px 20px 16px; background:linear-gradient(135deg,var(--verde-light),var(--verde)); border-radius:16px; padding:14px 16px; display:flex; align-items:center; gap:12px; color:white; }
  .oferta-banner-emoji { font-size:26px; }
  .oferta-banner-title { font-size:13px; font-weight:600; }
  .oferta-banner-sub { font-size:11px; opacity:0.85; }

  /* gradient colors for cards */
  .grad-verde { background: linear-gradient(135deg, #3D6B4F 0%, #5A9470 100%); }
  .grad-cielo { background: linear-gradient(135deg, #2C5F7A 0%, #4A8BA8 100%); }
  .grad-tierra { background: linear-gradient(135deg, #8B3E0A 0%, #C4601A 100%); }
  .grad-morado { background: linear-gradient(135deg, #5B4A7A 0%, #8B6FA8 100%); }
  .grad-rosa { background: linear-gradient(135deg, #8B3A5A 0%, #C46080 100%); }
  .grad-ocre { background: linear-gradient(135deg, #7A6B2C 0%, #A89B4A 100%); }

  .highlight-bar { height:3px; background:var(--tierra); width:40px; border-radius:2px; margin-bottom:16px; }
</style>
</head>
<body>

<!-- ===== PAGE: HOME ===== -->
<div class="page active" id="page-home">
  <div class="home-header">
    <div class="app-logo">
      <div class="logo-icon">🏔️</div>

<div class="page" id="page-ficha">
  <div class="ficha-header" id="ficha-header">

    <div class="ficha-actions">
      <button class="action-btn primary" id="ficha-tel-btn"><div class="action-btn-icon">📞</div><div class="action-btn-label">Llamar</div></button>
      <button class="action-btn"><div class="action-btn-icon">📍</div><div class="action-btn-label">Cómo llegar</div></button>
      <button class="action-btn"><div class="action-btn-icon">💬</div><div class="action-btn-label">WhatsApp</div></button>

    </div>
    <div class="ficha-section">
      <div class="ficha-section-title">Horarios</div>
      <div class="horarios-grid" id="ficha-horarios"></div>
    </div>
    <div class="ficha-section" id="ficha-oferta-section">
      <div class="ficha-section-title">Oferta activa</div>

          <div class="oferta-chip-title" id="ficha-oferta-title"></div>
          <div class="oferta-chip-sub" id="ficha-oferta-sub"></div>

    <div class="ficha-section">
      <div class="ficha-section-title">Ubicación</div>

    <div style="height:20px;"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="goHome()"><div class="nav-icon">🏠</div><div class="nav-label">Inicio</div></div>
    <div class="nav-item"><div class="nav-icon">🗺️</div><div class="nav-label">Mapa</div></div>
    <div class="nav-item"><div class="nav-icon">🏷️</div><div class="nav-label">Ofertas</div></div>
    <div class="nav-item"><div class="nav-icon">👤</div><div class="nav-label">Mi zona</div></div>
  </div>
</div>

<script>
// ===== DATA =====
const comercios = [
  {
    id:1, nombre:"Bodega El Almendro", categoria:"Restaurantes", plan:"destacado",
    emoji:"🍷", grad:"grad-verde", abierto:true,
    tel:"950 123 456", direccion:"Calle Mayor, 14 · Vélez Rubio",
    desc:"Bodega familiar con más de 30 años en Vélez Rubio. Especialidad en tapas, vinos de la tierra y cocina tradicional andaluza. Terraza con vistas al castillo árabe.",
    horarios:[{d:"Lun – Vie",h:"8:00 – 23:00"},{d:"Sábado",h:"10:00 – 24:00"},{d:"Domingo",h:"10:00 – 16:00"},{d:"Ahora",h:"✓ Abierto",open:true}],
    oferta:{emoji:"🍻", titulo:"Menú del día a 9,50€", sub:"Válido lun–vie · Todo abril"},
    verified:true
  },
  {
    id:2, nombre:"Casa Rural La Encina", categoria:"Alojamiento", plan:"destacado",
    emoji:"🏡", grad:"grad-cielo", abierto:true,
    tel:"950 234 567", direccion:"Carretera A-317, km 4 · Vélez Blanco",
    desc:"Casa rural con 6 habitaciones en plena naturaleza. Ideal para familias y grupos. Piscina, jardín y vistas al Parque Natural de Sierra María-Los Vélez.",
    horarios:[{d:"Recepción",h:"9:00 – 21:00"},{d:"Check-in",h:"Desde 15:00"},{d:"Check-out",h:"Hasta 12:00"},{d:"Ahora",h:"✓ Disponible",open:true}],
    oferta:{emoji:"🌿", titulo:"20% dto. reservas de semana", sub:"Válido abril y mayo"},
    verified:true
  },
  {
    id:3, nombre:"Supermercado García", categoria:"Alimentación", plan:"basico",
    emoji:"🛒", grad:"grad-tierra", abierto:true,
    tel:"950 345 678", direccion:"Avenida de Andalucía, 22 · Vélez Rubio",
    desc:"Supermercado familiar con más de 20 años sirviendo a los vecinos de Los Vélez. Productos frescos locales, carnicería, frutería y panadería propia.",
    horarios:[{d:"Lun – Sáb",h:"8:30 – 21:00"},{d:"Domingo",h:"9:00 – 14:00"},{d:"Festivos",h:"9:00 – 14:00"},{d:"Ahora",h:"✓ Abierto",open:true}],
    oferta:{emoji:"🍊", titulo:"20% en frutas y verduras", sub:"Esta semana solamente"},
    verified:false
  },
  {
    id:4, nombre:"Farmacia Martínez", categoria:"Servicios", plan:"basico",
    emoji:"💊", grad:"grad-morado", abierto:false,
    tel:"950 456 789", direccion:"Plaza de la Constitución, 3 · Vélez Rubio",
    desc:"Farmacia con servicio de guardia. Asesoramiento farmacéutico, ortopedia, productos de parafarmacia y cosmética natural.",
    horarios:[{d:"Lun – Vie",h:"9:00 – 14:00"},{d:"Lun – Vie",h:"17:00 – 21:00"},{d:"Sábado",h:"9:00 – 14:00"},{d:"Ahora",h:"✗ Cerrado",open:false}],
    oferta:null,
    verified:false
  },
  {
    id:5, nombre:"Restaurante Los Arcos", categoria:"Restaurantes", plan:"basico",
    emoji:"🍽️", grad:"grad-rosa", abierto:true,
    tel:"950 567 890", direccion:"Calle Cervantes, 8 · Vélez Rubio",
    desc:"Cocina casera con productos de temporada y recetas de la abuela. Especialidad en migas, gazpacho serrano y cordero al horno. Terraza interior climatizada.",
    horarios:[{d:"Mar – Dom",h:"13:00 – 16:30"},{d:"Jue – Dom",h:"20:00 – 23:30"},{d:"Lunes",h:"Cerrado"},{d:"Ahora",h:"✓ Abierto",open:true}],
    oferta:{emoji:"🥘", titulo:"Menú degustación 18€", sub:"Fines de semana · Reserva previa"},
    verified:false
  },
  {
    id:6, nombre:"Hotel Castillo de Vélez", categoria:"Alojamiento", plan:"destacado",
    emoji:"🏰", grad:"grad-ocre", abierto:true,
    tel:"950 678 901", direccion:"Camino del Castillo, s/n · Vélez Blanco",
    desc:"Hotel boutique de 12 habitaciones junto al Castillo de Vélez Blanco. Desayuno incluido, spa y vistas panorámicas a la sierra. Enclave único en Andalucía.",
    horarios:[{d:"Recepción",h:"24 horas"},{d:"Desayuno",h:"8:00 – 10:30"},{d:"Spa",h:"10:00 – 20:00"},{d:"Ahora",h:"✓ Abierto",open:true}],
    oferta:{emoji:"🛏️", titulo:"Noche + desayuno desde 85€", sub:"Reserva directa · Sin intermediarios"},
    verified:true
  }
];

const locked = [
  {nombre:"Taller Mecánico Ruiz", emoji:"🔧", cat:"Talleres"},
  {nombre:"Peluquería Lola", emoji:"💇", cat:"Servicios"},
  {nombre:"Bar El Rincón", emoji:"🍺", cat:"Restaurantes"},
  {nombre:"Ferretería López", emoji:"🔩", cat:"Servicios"},
];

const categorias = ["Todos", "Restaurantes", "Alojamiento", "Alimentación", "Servicios"];
let catActiva = "Todos";
let busqueda = "";

// ===== RENDER =====
function renderCats() {
  const c = document.getElementById("cats-container");
  c.innerHTML = categorias.map(cat => `
    <div class="cat-pill ${cat===catActiva?'active':''}" onclick="selectCat('${cat}')">
      <span>${catEmoji(cat)}</span><span>${cat}</span>
    </div>`).join("");
}

function catEmoji(cat) {
  return {Todos:"✨",Restaurantes:"🍽️",Alojamiento:"🏨",Alimentación:"🛒",Servicios:"💈"}[cat]||"📍";
}

function selectCat(cat) {
  catActiva = cat;
  renderCats();
  renderCards();
}

function renderCards() {
  let filtered = comercios.filter(c => {
    const matchCat = catActiva === "Todos" || c.categoria === catActiva;
    const matchSearch = busqueda === "" ||
      c.nombre.toLowerCase().includes(busqueda) ||
      c.categoria.toLowerCase().includes(busqueda) ||
      c.direccion.toLowerCase().includes(busqueda);
    return matchCat && matchSearch;
  });

  // Subtitle
  const total = catActiva === "Todos" ? comercios.length + locked.length : filtered.length;
  document.getElementById("subtitle-count").textContent =
    busqueda ? `${filtered.length} resultado${filtered.length!==1?"s":""} encontrado${filtered.length!==1?"s":""}` :
    catActiva === "Todos" ? `${comercios.length + locked.length} negocios locales a tu alcance` :
    `${filtered.length} negocio${filtered.length!==1?"s":""} en ${catActiva}`;

  // Featured
  const dest = filtered.filter(c => c.plan === "destacado");
  const featSec = document.getElementById("featured-section");
  if (dest.length > 0 && busqueda === "") {
    featSec.style.display = "block";
  } else {
    featSec.style.display = "none";
  }

  // Cards
  const cc = document.getElementById("cards-container");
  if (filtered.length === 0) {
    cc.innerHTML = `<div class="no-results">😕 No encontramos negocios que coincidan.<br>Probá con otro término.</div>`;
  } else {
    cc.innerHTML = filtered.map(c => cardHTML(c)).join("");
  }

  // Locked
  const lockedSec = document.getElementById("locked-section");
  const lc = document.getElementById("locked-container");
  if (busqueda !== "" || catActiva !== "Todos") {
    lockedSec.style.display = "none";
  } else {
    lockedSec.style.display = "block";
    lc.innerHTML = locked.map(l => `
      <div class="locked-card">
        <div class="locked-icon">${l.emoji}</div>
        <div>
          <div class="locked-name">${l.nombre}</div>
          <div class="locked-sub">Información no disponible · ${l.cat}</div>
        </div>
        <button class="locked-cta">¿Eres el dueño?</button>
      </div>`).join("");
  }

  // Oferta banner
  const ofertaBanner = document.querySelector(".oferta-banner");
  if (ofertaBanner) ofertaBanner.remove();
  const ofertaComercio = filtered.find(c => c.oferta && c.plan === "destacado");
  if (ofertaComercio && busqueda === "") {
    const banner = document.createElement("div");
    banner.className = "oferta-banner";
    banner.innerHTML = `<div class="oferta-banner-emoji">${ofertaComercio.oferta.emoji}</div><div><div class="oferta-banner-title">${ofertaComercio.oferta.titulo}</div><div class="oferta-banner-sub">${ofertaComercio.nombre} · ${ofertaComercio.oferta.sub}</div></div>`;
    cc.after(banner);
  }
}

function cardHTML(c) {
  const badgeClass = c.plan === "destacado" ? "badge-destacado" : "badge-basico";
  const badgeText = c.plan === "destacado" ? "✦ Destacado" : "● Básico";
  return `
  <div class="comercio-card" onclick="openFicha(${c.id})">
    <div class="card-img ${c.grad}">
      <div class="card-img-emoji">${c.emoji}</div>
      <span class="card-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${c.nombre}</div>
      <div class="card-cat">${c.categoria}</div>
      <div class="card-info">
        <span>${c.abierto ? '<span class="open-dot"></span> Abierto ahora' : '<span class="closed-dot"></span> Cerrado'}</span>
        <span>📍 ${c.direccion.split('·')[0].trim()}</span>
      </div>
    </div>
  </div>`;
}

// ===== FICHA =====
function openFicha(id) {
  const c = comercios.find(x => x.id === id);
  if (!c) return;

  document.getElementById("ficha-header").className = "ficha-header " + c.grad;
  document.getElementById("ficha-emoji").textContent = c.emoji;
  document.getElementById("ficha-verified").textContent = c.verified ? "✓ Verificado" : "";
  document.getElementById("ficha-verified").style.display = c.verified ? "block" : "none";
  document.getElementById("ficha-name").textContent = c.nombre;
  document.getElementById("ficha-cat").textContent = c.categoria + " · " + c.direccion.split("·")[1]?.trim();
  document.getElementById("ficha-desc").textContent = c.desc;
  document.getElementById("ficha-tel-btn").onclick = () => { window.location.href = "tel:" + c.tel.replace(/\s/g,""); };
  document.getElementById("ficha-ubicacion").innerHTML = "📍 " + c.direccion;

  // Horarios
  const h = document.getElementById("ficha-horarios");
  h.innerHTML = c.horarios.map(x => `
    <div class="horario-item">
      <div class="horario-day">${x.d}</div>
      <div class="horario-time" style="color:${x.open===false?'#e53935':x.open?'var(--verde)':'var(--tierra)'}">${x.h}</div>
    </div>`).join("");

  // Oferta
  const ofSec = document.getElementById("ficha-oferta-section");
  if (c.oferta) {
    ofSec.style.display = "block";
    document.getElementById("ficha-oferta-emoji").textContent = c.oferta.emoji;
    document.getElementById("ficha-oferta-title").textContent = c.oferta.titulo;
    document.getElementById("ficha-oferta-sub").textContent = c.oferta.sub;
  } else {
    ofSec.style.display = "none";
  }

  document.getElementById("page-home").classList.remove("active");
  document.getElementById("page-ficha").classList.add("active");
  window.scrollTo(0,0);
}

function goHome() {
  document.getElementById("page-ficha").classList.remove("active");
  document.getElementById("page-home").classList.add("active");
  window.scrollTo(0,0);
}

// ===== SEARCH =====
document.getElementById("search-input").addEventListener("input", function() {
  busqueda = this.value.toLowerCase().trim();
  renderCards();
});

// ===== INIT =====
renderCats();
renderCards();
</script>
</body>
</html>
